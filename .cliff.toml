# .cliff.toml
[changelog]
header = """# Changelog

"""
body = """
{% if version %}## [{{ version | trim }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## Unreleased{% endif %}
{% for section, commits in commits | group_by(attribute="group") %}
### {{ section | upper_first }}
{% for commit in commits %}- {{ commit.message | trim }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}

{% endfor -%}
"""

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Docs" },
  { message = "^test", group = "Tests" },
  { message = "^ci", group = "CI" },
  { message = "^build", group = "Build" },
  { message = "^chore", group = "Chores" },
]
