services:
  # --- Userspace TGT ---
  iscsi-target:
    profiles: ["tgt"]
    build:
      context: ./docker/tgt
      dockerfile: Dockerfile
    container_name: iscsi-target-tgt
    environment:
      TGT_IQN: ${TGT_IQN:-iqn.2025-08.example:disk0}
      TGT_SIZE_MB: ${TGT_SIZE_MB:-1050}
      TGT_LUN: ${TGT_LUN:-1}
      TGT_PGT: ${TGT_PGT:-1}
      TGT_CHAP_USER: ${TGT_CHAP_USER:-}
      TGT_CHAP_PASS: ${TGT_CHAP_PASS:-}
      TGT_MUTUAL_USER: ${TGT_MUTUAL_USER:-}
      TGT_MUTUAL_PASS: ${TGT_MUTUAL_PASS:-}
      TGT_DIGEST: ${TGT_DIGEST:-}
    ports:
      - "3260:3260/tcp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-S", "/run/tgtd/socket.0"]
      interval: 1s
      timeout: 1s
      retries: 60
      start_period: 2s
    tmpfs:
      - /run/tgtd
    labels:
      com.iscsi.role: "target"
